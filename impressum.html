<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">

<style>
:root {
  --bg: #fafaf8; --text: #1a1a1a; --text2: #6b6b67; --text3: #9b9b95; --border: rgba(0,0,0,0.08);

}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Source Sans 3', -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.8; -webkit-font-smoothing: antialiased; }
.container { max-width: 600px; margin: 0 auto; padding: 3rem 1.5rem; }
h1 { font-size: 22px; font-weight: 500; margin-bottom: 1.5rem; }
p { font-size: 15px; color: var(--text2); margin-bottom: 0.5rem; }
a { color: var(--text2); }
.back { display: inline-block; margin-bottom: 2rem; font-size: 14px; color: var(--text3); text-decoration: none; }
.back:hover { color: var(--text); }
</style>
</head>
